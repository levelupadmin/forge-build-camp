        {"@type":"Question","name":"Who is the Forge AI Residency for?","acceptedAnswer":{"@type":"Answer","text":"Founders, operators, and business leaders who want to build with AI. No coding background needed."}},
        {"@type":"Question","name":"How is this different from other AI cohorts?","acceptedAnswer":{"@type":"Answer","text":"You stop watching. You sit in a room with 19 other builders for 7 days. You do not leave until two real things are shipped. No replay tab. No catching up next week. Just the room, the mentors, and the work."}},
        {"@type":"Question","name":"How do I know I will finish here?","acceptedAnswer":{"@type":"Answer","text":"Because the room will not let you. Mentor ratio is 1 to 5. Daily build standups. Outdoor hackathon on Day 6. Demo Day on Day 7 where you present a working build to the cohort."}},

        {"@type":"Question","name":"What is included in the program fee?","acceptedAnswer":{"@type":"Answer","text":"Residential stay, all meals, both tracks (Operations + Product), expert faculty, curated experiences, community access, and the LevelUp AI Vault. Everything except your travel to the venue."}},
        {"@type":"Question","name":"How many people are in each cohort?","acceptedAnswer":{"@type":"Answer","text":"20. Hard limit. This is what allows faculty to actually work with you and not just present to you."}},
        {"@type":"Question","name":"What is the application fee for?","acceptedAnswer":{"@type":"Answer","text":"It books your interview slot and signals intent to the selection team. It is separate from the program fee."}},
        {"@type":"Question","name":"What do I actually leave with?","acceptedAnswer":{"@type":"Answer","text":"A working AI product, a live automation that runs your business, a 90-day roadmap, and a network of 20 serious builders."}},
        {"@type":"Question","name":"I have a full-time job. Can I attend?","acceptedAnswer":{"@type":"Answer","text":"Yes. Most participants are working professionals. You take a fixed block of time off and come back with something done."}},
